      class="paper ink"
      filter="url(#paperNoise)"
      d="M135 484c-43-24-47-83-11-118 26-25 61-21 79-50 21-35 25-81 68-99 47-20 91 19 129 1 38-18 32-68 79-85 47-18 84 20 124 2 50-23 60-90 119-93 68-3 79 73 142 83 48 7 88-25 129-2 39 21 38 68 69 94 27 23 77 15 104 50 34 44 7 94 24 139 16 43 69 58 70 108 1 48-48 72-67 112-19 39 2 88-32 116-37 31-90-4-138 13-48 18-67 72-120 75-51 2-69-45-119-48-50-4-78 39-129 28-49-10-62-60-108-64-49-4-78 47-129 35-43-10-51-52-90-66-49-17-92 31-134 7-40-23-22-78-59-100-35-20-80 8-111-22-31-30-13-76-39-105z"
