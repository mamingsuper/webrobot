<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Citizen and AI bureaucrat in conversation</title>
  <desc id="desc">A hand-drawn sticker illustration of a citizen at an administrative service counter speaking with an AI bureaucratic interface.</desc>
  <defs>
    <filter id="paperNoise" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="17" result="noise" />
      <feColorMatrix in="noise" type="saturate" values="0" result="mono" />
      <feBlend in="SourceGraphic" in2="mono" mode="multiply" result="paper" />
      <feComponentTransfer in="paper">
        <feFuncA type="table" tableValues="0 0.11" />
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="paper" operator="over" />
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="20" stdDeviation="16" flood-color="#182625" flood-opacity="0.14" />
    </filter>
    <style>
      .ink { stroke: #172625; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .ink-thin { stroke: #172625; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 12 14; }
      .paper { fill: #fff8ea; }
      .cream { fill: #f2e4c7; }
      .teal { fill: #dfece7; }
      .deep-teal { fill: #2f6362; }
      .blue-teal { fill: #6f9697; }
      .ink-fill { fill: #172625; }
      .amber { fill: #e7ae55; }
      .amber-soft { fill: #f5d69b; }
      .none { fill: none; }
      .label {
        fill: #172625;
        font-family: ui-serif, Georgia, "Times New Roman", serif;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0;
      }
      .micro {
        fill: #315d5a;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }
    </style>
  </defs>

  <g filter="url(#softShadow)">
